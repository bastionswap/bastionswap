[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "cancun"
via_ir = false
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "./" }]

[lint]
# Suppress false-positive linter warnings:
# - unsafe-typecast: V4 API requires int256/uint256/int128/uint128 conversions (safe by design)
# - divide-before-multiply: tick alignment (MIN_TICK / tickSpacing) * tickSpacing is intentional rounding
# - erc20-unchecked-transfer: remaining warnings are in test/script files (TestToken always returns true)
exclude_lints = ["unsafe-typecast", "divide-before-multiply", "erc20-unchecked-transfer"]

[profile.deploy]
optimizer_runs = 1_000_000
via_ir = true

[invariant]
runs = 10000
depth = 50
fail_on_revert = false

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC}"
base_mainnet = "${BASE_MAINNET_RPC}"

[etherscan]
base_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api", chain = 84532 }
base_mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api.basescan.org/api", chain = 8453 }
