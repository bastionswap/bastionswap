specVersion: 0.0.5
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: BastionHook
    network: base-sepolia
    source:
      address: "0xfeD3C0F50312cB437F999a03D98576115bA90Ac0"
      abi: BastionHook
      startBlock: 38516081
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - Escrow
        - Issuer
        - InsurancePool
        - ProtocolStats
      abis:
        - name: BastionHook
          file: ../contracts/out/BastionHook.sol/BastionHook.json
      eventHandlers:
        - event: IssuerRegistered(indexed bytes32,indexed address,address)
          handler: handleIssuerRegistered
        - event: EscrowCreated(indexed bytes32,indexed uint256,indexed address)
          handler: handleEscrowCreated
        - event: InsuranceFeeDeposited(indexed bytes32,uint256)
          handler: handleInsuranceFeeDeposited
        - event: IssuerSaleReported(indexed bytes32,indexed address,uint256)
          handler: handleIssuerSaleReported
        - event: LPRemovalReported(indexed bytes32,uint256,uint256)
          handler: handleLPRemovalReported
        - event: ExternalCallFailed(string,indexed bytes32)
          handler: handleExternalCallFailed
      file: ./src/mappings/bastionHook.ts

  - kind: ethereum
    name: PoolManager
    network: base-sepolia
    source:
      address: "0x05E73354cFDd6745C338b50BcFDfA3Aa6fA03408"
      abi: PoolManager
      startBlock: 38516081
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - Swap
        - PoolHourData
        - PoolDayData
      abis:
        - name: PoolManager
          file: ./abis/PoolManager.json
      eventHandlers:
        - event: Initialize(indexed bytes32,indexed address,indexed address,uint24,int24,address,uint160,int24)
          handler: handleInitialize
        - event: Swap(indexed bytes32,indexed address,int128,int128,uint160,uint128,int24,uint24)
          handler: handleSwap
        - event: ModifyLiquidity(indexed bytes32,indexed address,int24,int24,int256,bytes32)
          handler: handleModifyLiquidity
      file: ./src/mappings/poolManager.ts

  - kind: ethereum
    name: EscrowVault
    network: base-sepolia
    source:
      address: "0x83D2A0be3C7f5728a560B76BBB29b0a2fDb97241"
      abi: EscrowVault
      startBlock: 38516081
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Escrow
        - Commitment
        - Issuer
        - ProtocolStats
      abis:
        - name: EscrowVault
          file: ../contracts/out/EscrowVault.sol/EscrowVault.json
      eventHandlers:
        - event: EscrowCreated(indexed uint256,indexed bytes32,indexed address,uint128,uint40,uint40)
          handler: handleEscrowVaultCreated
        - event: LiquidityAdded(indexed uint256,uint128,uint128)
          handler: handleLiquidityAdded
        - event: LPRemovalRecorded(indexed uint256,uint128)
          handler: handleLPRemovalRecorded
        - event: ForceRemoval(indexed uint256,indexed uint8,uint128)
          handler: handleForceRemoval
        - event: ForceRemovalFailed(indexed uint256,bytes)
          handler: handleForceRemovalFailed
        - event: CommitmentSet(indexed uint256,(uint16,uint16))
          handler: handleCommitmentSet
      file: ./src/mappings/escrowVault.ts

  - kind: ethereum
    name: InsurancePool
    network: base-sepolia
    source:
      address: "0x37ce342D5366999D2C526908e88772C61a45bC4a"
      abi: InsurancePool
      startBlock: 38516081
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - InsurancePool
        - Claim
        - ProtocolStats
      abis:
        - name: InsurancePool
          file: ../contracts/out/InsurancePool.sol/InsurancePool.json
      eventHandlers:
        - event: FeeDeposited(indexed bytes32,uint256)
          handler: handleFeeDeposited
        - event: PayoutExecuted(indexed bytes32,indexed uint8,uint256)
          handler: handlePayoutExecuted
        - event: CompensationClaimed(indexed bytes32,indexed address,uint256)
          handler: handleCompensationClaimed
        - event: EscrowFundsReceived(indexed bytes32,uint256,address,uint256)
          handler: handleEscrowFundsReceived
        - event: FeeRateUpdated(uint16,uint16)
          handler: handleFeeRateUpdated
      file: ./src/mappings/insurancePool.ts

  - kind: ethereum
    name: TriggerOracle
    network: base-sepolia
    source:
      address: "0x624d89EddE24BE86a971bDaf8268561d40D0c730"
      abi: TriggerOracle
      startBlock: 38516081
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TriggerEvent
        - Pool
        - InsurancePool
        - ProtocolStats
      abis:
        - name: TriggerOracle
          file: ../contracts/out/TriggerOracle.sol/TriggerOracle.json
      eventHandlers:
        - event: TriggerPending(indexed bytes32,indexed uint8,uint40)
          handler: handleTriggerPending
        - event: TriggerExecuted(indexed bytes32,indexed uint8,bool)
          handler: handleTriggerExecuted
        - event: MerkleRootSubmitted(indexed bytes32,bytes32)
          handler: handleMerkleRootSubmitted
      file: ./src/mappings/triggerOracle.ts

  - kind: ethereum
    name: ReputationEngine
    network: base-sepolia
    source:
      address: "0xeB8529cD6bE727355C07cc0685140ADE49198A43"
      abi: ReputationEngine
      startBlock: 38516081
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Issuer
      abis:
        - name: ReputationEngine
          file: ../contracts/out/ReputationEngine.sol/ReputationEngine.json
      eventHandlers:
        - event: ReputationUpdated(indexed address,indexed uint8,uint256)
          handler: handleReputationUpdated
      file: ./src/mappings/reputationEngine.ts

  - kind: ethereum
    name: BastionPositionRouter
    network: base-sepolia
    source:
      address: "0x7D0789EE508A15FB2bE29CfaC81f51C51b733447"
      abi: BastionPositionRouter
      startBlock: 38516081
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Position
        - LiquidityEvent
      abis:
        - name: BastionPositionRouter
          file: ../contracts/out/BastionPositionRouter.sol/BastionPositionRouter.json
      eventHandlers:
        - event: LiquidityChanged(indexed bytes32,indexed address,int24,int24,int256,int128,int128)
          handler: handleLiquidityChanged
      file: ./src/mappings/bastionRouter.ts
