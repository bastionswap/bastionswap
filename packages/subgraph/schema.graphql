type Pool @entity {
  id: ID! # poolId (bytes32)
  token0: Bytes!
  token1: Bytes!
  hook: Bytes! # hook contract address
  fee: Int
  tickSpacing: Int
  sqrtPriceX96: BigInt
  liquidity: BigInt
  reserve0: BigDecimal
  reserve1: BigDecimal
  isBastion: Boolean!
  issuer: Issuer # issuer (Bastion pools only)
  issuedToken: Bytes # issued token address
  escrow: Escrow # escrow state
  insurancePool: InsurancePool # insurance pool state
  triggerEvents: [TriggerEvent!]! @derivedFrom(field: "pool")
  claims: [Claim!]! @derivedFrom(field: "pool")
  positions: [Position!]! @derivedFrom(field: "pool")
  swaps: [Swap!]! @derivedFrom(field: "pool")
  liquidityEvents: [LiquidityEvent!]! @derivedFrom(field: "pool")
  poolHourData: [PoolHourData!]! @derivedFrom(field: "pool")
  poolDayData: [PoolDayData!]! @derivedFrom(field: "pool")
  createdAt: BigInt!
  createdTx: Bytes!
}

type Escrow @entity {
  id: ID! # escrowId (uint256 hex)
  pool: Pool!
  issuer: Bytes!
  totalLiquidity: BigDecimal!
  removedLiquidity: BigDecimal!
  remainingLiquidity: BigDecimal!
  lockDuration: BigInt! # lock duration in seconds
  vestingDuration: BigInt! # linear vesting duration in seconds
  commitment: Commitment
  isTriggered: Boolean!
  createdAt: BigInt!
}

type Commitment @entity {
  id: ID! # escrowId
  escrow: Escrow!
  maxSellPercent: BigInt!
}

type InsurancePool @entity {
  id: ID! # poolId
  pool: Pool!
  balance: BigDecimal!
  escrowEthBalance: BigDecimal!
  escrowTokenBalance: BigDecimal!
  isTriggered: Boolean!
  triggerType: Int
  merkleRoot: Bytes
  useMerkleProof: Boolean!
  totalClaimed: BigDecimal!
  feeRate: Int!
  holderCount: Int!
}

type TriggerEvent @entity {
  id: ID! # poolId-triggerType-timestamp
  pool: Pool!
  triggerType: Int!
  triggerTypeName: String!
  timestamp: BigInt!
  transactionHash: Bytes!
  escrowForceRemoved: Boolean!
  liquidityRemoved: BigDecimal
  insurancePayout: BigDecimal
  withMerkleRoot: Boolean!
}

type Issuer @entity {
  id: ID! # issuer address
  pools: [Pool!]! @derivedFrom(field: "issuer")
  reputationScore: BigInt!
  totalEscrowsCreated: Int!
  totalEscrowsCompleted: Int!
  totalTriggersActivated: Int!
  lastUpdated: BigInt!
}

type Claim @entity {
  id: ID! # poolId-holderAddress
  pool: Pool!
  holder: Bytes!
  amount: BigDecimal!
  tokenAmount: BigDecimal
  claimedAt: BigInt!
  transactionHash: Bytes!
}

type Position @entity {
  id: ID! # poolId-user-tickLower-tickUpper
  pool: Pool!
  owner: Bytes!
  tickLower: Int!
  tickUpper: Int!
  liquidity: BigInt!
  isFullRange: Boolean!
  createdAt: BigInt!
  lastUpdatedAt: BigInt!
}

type ProtocolStats @entity {
  id: ID! # "global"
  totalBastionPools: Int!
  totalStandardPools: Int!
  totalEscrowLocked: BigDecimal!
  totalInsuranceBalance: BigDecimal!
  totalTriggersActivated: Int!
  totalCompensationPaid: BigDecimal!
}

type Swap @entity {
  id: ID! # txHash-logIndex
  pool: Pool!
  sender: Bytes!
  amount0: BigInt! # raw signed int128
  amount1: BigInt! # raw signed int128
  sqrtPriceX96: BigInt!
  tick: Int!
  timestamp: BigInt!
  blockNumber: BigInt!
  transaction: Bytes!
}

type LiquidityEvent @entity {
  id: ID! # txHash-logIndex
  pool: Pool!
  sender: Bytes!
  type: String! # "ADD" | "REMOVE" | "COLLECT"
  amount0: BigInt! # raw
  amount1: BigInt! # raw
  liquidity: BigInt!
  tickLower: Int!
  tickUpper: Int!
  timestamp: BigInt!
  blockNumber: BigInt!
  transaction: Bytes!
}

type PoolHourData @entity {
  id: ID! # poolId-hourStartUnix
  pool: Pool!
  hourStartUnix: Int!
  open: BigDecimal!
  close: BigDecimal!
  high: BigDecimal!
  low: BigDecimal!
  volumeToken0: BigInt! # raw cumulative
  volumeToken1: BigInt! # raw cumulative
  txCount: Int!
}

type PoolDayData @entity {
  id: ID! # poolId-dayStartUnix
  pool: Pool!
  dayStartUnix: Int!
  open: BigDecimal!
  close: BigDecimal!
  high: BigDecimal!
  low: BigDecimal!
  volumeToken0: BigInt!
  volumeToken1: BigInt!
  txCount: Int!
}
